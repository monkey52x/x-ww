<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>x-ww</title>
  <script>
    (function() {
      var l = window.location;
      if (l.search.indexOf('?/') === 0) return;
      var rest = l.pathname.replace(/\/$/, '').slice(1);
      var qs = l.search.replace(/&/g, '~and~');
      l.replace('/?/' + rest + (qs ? '&' + qs.slice(1) : '') + l.hash);
    })();
  </script>
</head>
<body></body>
</html>

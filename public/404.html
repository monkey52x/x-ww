<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>x-ww</title>
  <script>
    (function() {
      var segmentsToKeep = 1;
      var l = window.location;
      var p = l.pathname.split('/').filter(Boolean);
      var kept = p.slice(0, segmentsToKeep).join('/');
      var rest = p.slice(segmentsToKeep).join('/');
      var qs = l.search.replace(/&/g, '~and~');
      var redirect = l.protocol + '//' + l.host + '/' + kept + '/?/' + rest + (qs ? '&' + qs.slice(1) : '') + l.hash;
      l.replace(redirect);
    })();
  </script>
</head>
<body></body>
</html>
